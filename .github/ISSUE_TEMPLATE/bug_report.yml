name: Bug report
description: Report incorrect behavior, false positives, false negatives, or CLI failures.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest project snippet, command, or fixture needed to reproduce the issue. Redact secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: AgentReady output
      description: Paste relevant output. Do not include real secrets, tokens, private keys, or private paths.
      render: text
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `agentready version` or the npm package version.
      placeholder: "0.1.0"
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.x"
    validations:
      required: false
